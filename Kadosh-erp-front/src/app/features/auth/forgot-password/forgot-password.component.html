<section class="auth-shell">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Recuperar contrasena</mat-card-title>
      <mat-card-subtitle>Te enviaremos instrucciones para restablecer acceso.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" class="auth-form" (ngSubmit)="send()">
        <mat-form-field appearance="outline">
          <mat-label>Usuario o correo</mat-label>
          <input matInput formControlName="emailOrUser" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="send-btn">Enviar</button>
      </form>

      @if (submitted) {
        <p class="sent-message">Solicitud enviada correctamente.</p>
      }
    </mat-card-content>

    <mat-card-actions>
      <a mat-button routerLink="/login">Volver al login</a>
    </mat-card-actions>
  </mat-card>
</section>
